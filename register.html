<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Petrion Academy</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="container" style="max-width: 460px;">
      <div class="text-center mt-5 mb-4">
        <h1 class="h3 fw-bold">
          <i class="bi bi-shield-fill text-cyan"></i>
          Petrion <span class="text-cyan">Academy</span>
        </h1>
        <p class="text-secondary">Create your account</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="mb-3">
            <label for="fullName" class="form-label">Full name</label>
            <input type="text" id="fullName" class="form-control" placeholder="Your name" />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="At least 6 characters" />
          </div>

          <div id="message" class="mb-3"></div>

          <button id="registerBtn" class="btn btn-petrion w-100">
            <i class="bi bi-person-plus me-1"></i> Register
          </button>

          <p class="text-center mt-3 mb-0 text-secondary">
            Already have an account? <a href="login.html">Log in</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="src/pages/register.js"></script>
  </body>
</html>
