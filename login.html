<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — Petrion Academy</title>
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="container" style="max-width: 460px;">
      <div class="text-center mt-5 mb-4">
        <h1 class="h3 fw-bold">
          <i class="bi bi-shield-fill text-cyan"></i>
          Petrion <span class="text-cyan">Academy</span>
        </h1>
        <p class="text-secondary">Welcome back</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Your password" />
          </div>

          <div id="message" class="mb-3"></div>

          <button id="loginBtn" class="btn btn-petrion w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Log in
          </button>

          <p class="text-center mt-3 mb-0 text-secondary">
            No account yet? <a href="register.html">Register</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="src/pages/login.js"></script>
  </body>
</html>
